name: Deploy to Production

on:
  push:
    branches: [master]

jobs:
  # ── Frontend → Firebase Hosting (aurasense3.web.app) ─────────────────────
  deploy-frontend:
    name: Frontend → Firebase Hosting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Create .env.production
        working-directory: frontend
        run: |
          cat > .env.production << EOF
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_API_URL=${{ secrets.VITE_API_URL }}
          EOF

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_AURASENSE3 }}
          channelId: live
          projectId: aurasense3

  # ── Backend → Google Cloud Run ────────────────────────────────────────────
  deploy-backend:
    name: Backend → Cloud Run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy aura-backend \
            --source backend \
            --region asia-southeast1 \
            --project gen-lang-client-0775423738 \
            --allow-unauthenticated \
            --timeout 3600 \
            --update-env-vars PHOENIX_API_KEY=${{ secrets.PHOENIX_API_KEY }} \
            --quiet
